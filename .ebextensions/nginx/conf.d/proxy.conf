# Allow resume uploads up to the app's 2.5 MB limit, with headroom for
# multipart/form-data overhead. This file targets the legacy Amazon Linux
# (AL1) Elastic Beanstalk platforms; .platform/nginx/conf.d/proxy.conf
# targets Amazon Linux 2 / 2023 platforms.
client_max_body_size 3M;

# Fallback maintenance page when upstream is unreachable. Same as the AL2
# config in .platform/nginx/conf.d/proxy.conf — kept in sync.
proxy_intercept_errors on;
error_page 500 502 503 504 = @maintenance;

location @maintenance {
  internal;
  root /var/app/current/static;
  rewrite ^.*$ /maintenance.html break;
  add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  add_header Retry-After "120" always;
}
