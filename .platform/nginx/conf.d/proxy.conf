# Allow resume uploads up to the app's 2.5 MB limit, with headroom for
# multipart/form-data overhead (boundaries, headers, other form fields).
# Without this override, Elastic Beanstalk's nginx uses the 1 MB default
# and returns a 413 HTML page before requests reach FastAPI.
client_max_body_size 3M;

# ---------------------------------------------------------------- Fallback page
# When the upstream FastAPI process is unreachable (process crashed, deploy in
# flight, OOM-killed, gateway timeout) nginx returns the static maintenance
# page instead of its raw "502 Bad Gateway" / "504 Gateway Time-out" default.
# Visitors see "we're working on it" even when the Python app is dead.
#
# Status code is preserved (503/502/504) so browsers + search engines treat it
# as a transient outage, not a real 200 OK.
proxy_intercept_errors on;
error_page 500 502 503 504 = @maintenance;

location @maintenance {
  internal;
  root /var/app/current/static;
  rewrite ^.*$ /maintenance.html break;
  add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  add_header Retry-After "120" always;
}
